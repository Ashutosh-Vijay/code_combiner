name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build — Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ContextForge_windows_x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ContextForge_windows_x64.zip
          path: ContextForge_windows_x64.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ContextForge ${{ github.ref_name }}
          files: ContextForge_windows_x64.zip
          body: |
            ## ContextForge ${{ github.ref_name }}

            Stop pasting files one by one into your LLM. Drop a folder, pick your files, copy your context.

            **Windows 10/11 (x64)** — Extract and run `ContextForge.exe`. No installer required.

            ---

            ### Features
            - Smart codebase scanning with GitIgnore support
            - Per-project exclusion config (`.exclusion_settings.json`)
            - Token budget visualizer with color-coded context budget
            - Output formats: XML, Markdown, Plain Text
            - File tree generation
            - Memory-safe streaming for large codebases
            - Windows 11 Mica/Acrylic glass UI with theme flavors
            - Drag & drop folder loading
